services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-playbacc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-playbacc}
      POSTGRES_DB: ${DB_NAME:-playbacc}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgweb:
    image: sosedoff/pgweb
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${DB_USER:-playbacc}:${DB_PASSWORD:-playbacc}@postgres:5432/${DB_NAME:-playbacc}?sslmode=disable
    ports:
      - "8081:8081"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAXMEMORY:-64mb}
      - --maxmemory-policy
      - noeviction
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
