name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Format + Lint
        run: bun run check

      - name: Typecheck (api/shared) + svelte-check (web)
        run: bun run typecheck
