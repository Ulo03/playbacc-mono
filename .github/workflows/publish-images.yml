name: Publish Docker images

on:
  push:
    tags:
      - 'api/v*'
      - 'web/v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  api:
    name: Build & publish playbacc-api
    if: startsWith(github.ref_name, 'api/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#api/v}" >> "$GITHUB_ENV"

      - name: Set image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/playbacc-api:${{ env.VERSION }}
            ghcr.io/${{ env.IMAGE_OWNER }}/playbacc-api:latest
          labels: |
            org.opencontainers.image.title=playbacc-api
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web:
    name: Build & publish playbacc-web
    if: startsWith(github.ref_name, 'web/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#web/v}" >> "$GITHUB_ENV"

      - name: Set image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/playbacc-web:${{ env.VERSION }}
            ghcr.io/${{ env.IMAGE_OWNER }}/playbacc-web:latest
          labels: |
            org.opencontainers.image.title=playbacc-web
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
